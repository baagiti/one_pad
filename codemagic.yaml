workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # App Store Connect API key integration (shared with metronom-akort-app).
      app_store_connect: metronometuner
    environment:
      # Uses the account-level code signing identities: the "ios_distribution"
      # certificate generated 2026-07-20 and the "onePad App Store"
      # provisioning profile fetched from Apple. No secrets in env vars.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.burakakkaya.onePad
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Run tests
        script: flutter test
      - name: Install pods
        script: |
          find . -name "Podfile" -maxdepth 2 -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload only; assign to the Internal Testing group by hand on
        # App Store Connect (internal testing needs no Apple review).
        submit_to_testflight: false
