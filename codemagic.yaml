workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Reuses the App Store Connect API key integration already set up for
      # metronom-akort-app in the Codemagic team settings.
      app_store_connect: metronometuner
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        # Must contain CERTIFICATE_PRIVATE_KEY_B64 (same key as the
        # metronome app's group; add this group to the one_pad app in the
        # Codemagic UI).
        - ios_signing
      vars:
        BUNDLE_ID: com.burakakkaya.onePad
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files (create if missing)
        script: |
          # CERTIFICATE_PRIVATE_KEY_B64 is the PEM private key, base64-encoded
          # so it survives being pasted into a single-line UI field intact.
          export CERTIFICATE_PRIVATE_KEY=$(echo "$CERTIFICATE_PRIVATE_KEY_B64" | base64 --decode)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Run tests
        script: flutter test
      - name: Install pods
        script: |
          find . -name "Podfile" -maxdepth 2 -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload only; assign to the Internal Testing group by hand on
        # App Store Connect (internal testing needs no Apple review).
        submit_to_testflight: false
